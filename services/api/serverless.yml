service: jobs-crawler-api
frameworkVersion: "4"

build:
  esbuild: false

plugins:
  - serverless-esbuild
  - serverless-offline

provider:
  name: aws
  runtime: nodejs20.x
  stage: ${opt:stage, 'dev'}
  region: ${env:AWS_REGION, 'us-east-1'}
  environment:
    JOBS_TABLE_NAME: ${env:JOBS_TABLE_NAME, 'JobListings'}
    CORS_ALLOW_ORIGIN: ${env:CORS_ALLOW_ORIGIN, 'https://jobs-crawler.andithang.org'}
    GEMINI_API_KEY: ${env:GEMINI_API_KEY, ''}
    DEFAULT_CRAWL_QUERY: ${env:DEFAULT_CRAWL_QUERY, 'You are a job data extraction engine for a DynamoDB ingestion pipeline.\n\nTASK\nFind real, currently active job listings on the public internet using web search for this intent:\n"{{CRAWL_QUERY}}"\n\nOUTPUT RULES (STRICT)\n1) Return ONLY valid JSON.\n2) Do NOT return markdown.\n3) Do NOT return explanations or extra keys.\n4) Top-level object must be exactly:\n{\n  "jobs": [ ... ]\n}\n5) Each item in "jobs" must contain ALL fields below (no missing fields):\n- jobTitle (string)\n- companyName (string)\n- location (string)\n- referringURL (string, absolute https URL to original listing page)\n- jobDescription (string)\n- salary (string)\n- benefits (string)\n- remoteStatus (string enum: "remote" | "offline" | "hybrid")\n- datePosted (string, ISO-8601 with timezone, e.g. "2026-03-30T00:00:00.000Z")\n\nQUALITY + NORMALIZATION RULES\n- Return at most {{MAX_RESULTS}} jobs.\n- Include only unique jobs (dedupe by referringURL).\n- Only include postings that appear to be real job listings (not blog posts, category pages, or search result pages).\n- referringURL must be the direct job listing URL, not homepage.\n- remoteStatus mapping:\n  - fully remote => "remote"\n  - on-site / in-office => "offline"\n  - hybrid => "hybrid"\n- If salary is unavailable, set salary to "Not specified".\n- If benefits are unavailable, set benefits to "Not specified".\n- If jobDescription is long, summarize to 1-3 sentences while preserving key responsibilities.\n- Prefer jobs posted recently; if exact posting date is not available, estimate conservatively and still return valid ISO-8601 with timezone.\n- All strings must be non-empty and trimmed.\n\nVALIDATION CHECK BEFORE FINALIZING\n- Ensure JSON parses.\n- Ensure every job has all required keys and correct enum/date/url formats.\n- Ensure no null values.\n- Ensure no duplicate referringURL.\n\nReturn final JSON now.'}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:BatchWriteItem
            - dynamodb:DeleteItem
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:Query
            - dynamodb:Scan
          Resource:
            - arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/${env:JOBS_TABLE_NAME, 'JobListings'}
            - arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/${env:JOBS_TABLE_NAME, 'JobListings'}/index/*
  apiGateway:
    usagePlan:
      quota:
        limit: 10
        period: DAY
      throttle:
        burstLimit: 2
        rateLimit: 1

functions:
  insertJobs:
    handler: src/handlers/insertJobs.handler
    timeout: 180
    events:
      - http:
          path: jobs
          method: post
          cors:
            origin: ${env:CORS_ALLOW_ORIGIN, 'https://jobs-crawler.andithang.org'}
            headers:
              - Content-Type
              - X-Amz-Date
              - Authorization
              - X-Amz-Security-Token
          private: false
  searchJobs:
    handler: src/handlers/searchJobs.handler
    events:
      - http:
          path: jobs
          method: get
          cors:
            origin: ${env:CORS_ALLOW_ORIGIN, 'https://jobs-crawler.andithang.org'}
            headers:
              - Content-Type
          private: false
  cleanupJobs:
    handler: src/handlers/cleanupJobs.handler
    events:
      - schedule: rate(1 day)

resources:
  Resources:
    JobListingsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${env:JOBS_TABLE_NAME, 'JobListings'}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: jobId
            AttributeType: S
          - AttributeName: datePosted
            AttributeType: S
        KeySchema:
          - AttributeName: jobId
            KeyType: HASH
          - AttributeName: datePosted
            KeyType: RANGE

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node20
    platform: node
    concurrency: 10
