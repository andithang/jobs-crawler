name: Next.js (Web)

on:
  push:
    branches:
      - main
    paths:
      - apps/web/**
      - packages/shared/**
      - package.json
      - package-lock.json
      - .github/workflows/nextjs.yml
  pull_request:
    branches:
      - main
    paths:
      - apps/web/**
      - packages/shared/**
      - package.json
      - package-lock.json
      - .github/workflows/nextjs.yml
  workflow_dispatch:

concurrency:
  group: nextjs-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint web
        run: npm run lint -w @jobs-crawler/web

      - name: Test web
        run: npm run test -w @jobs-crawler/web

      - name: Build web
        run: npm run build -w @jobs-crawler/web
